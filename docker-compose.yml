version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: weather-postgres
    restart: always

    environment:
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_pass
      POSTGRES_DB: weather_db

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data


  weather-service:
    build: .

    container_name: weather-service

    ports:
      - "8080:8080"

    environment:
      DATABASE_URL: postgres://weather_user:weather_pass@postgres:5432/weather_db?sslmode=disable
      WEATHER_API_KEY: ${WEATHER_API_KEY}

    depends_on:
      - postgres


volumes:
  pgdata: